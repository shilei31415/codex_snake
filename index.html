<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小游戏合集</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #121314;
      --panel: #1b1d20;
      --panel-2: #24272b;
      --panel-3: #2c3035;
      --line: #3c4249;
      --line-strong: #68707a;
      --text: #f5f1e8;
      --muted: #b8b1a4;
      --accent: #d8a645;
      --accent-2: #56b68b;
      --danger: #f06d62;
      --snake: #7bc95f;
      --food: #ff665c;
      --tile: #ead9b8;
      --tile-text: #25211b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 12%, rgba(216, 166, 69, 0.18), transparent 22rem),
        radial-gradient(circle at 82% 18%, rgba(86, 182, 139, 0.14), transparent 24rem),
        linear-gradient(145deg, #0f1011 0%, var(--bg) 58%, #1b1711 100%);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    button {
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease, color 120ms ease;
    }

    button:hover {
      background: var(--panel-3);
      border-color: var(--accent);
    }

    button:active {
      transform: translateY(1px);
    }

    .app-shell {
      width: min(96vw, 980px);
      margin: 0 auto;
      padding: 22px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(27, 29, 32, 0.9);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.35);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .brand h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1;
      letter-spacing: 0;
    }

    .brand span {
      color: var(--muted);
      font-size: 13px;
    }

    .nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav button {
      min-height: 38px;
      padding: 0 14px;
    }

    .nav button.active {
      background: #3b321f;
      border-color: var(--accent);
      color: #ffe0a3;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(27, 29, 32, 0.92);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
    }

    .lobby {
      padding: 22px;
    }

    .lobby-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .lobby h2,
    .game-title h2 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1;
      letter-spacing: 0;
    }

    .hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .game-card {
      display: grid;
      min-height: 180px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.04), transparent 48%),
        var(--panel-2);
      text-align: left;
    }

    .game-card:hover {
      border-color: var(--accent);
    }

    .game-card strong {
      display: block;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .game-card span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .game-card .card-art {
      align-self: end;
      margin-top: 24px;
      font-size: 40px;
      letter-spacing: 0;
    }

    .game-shell {
      padding: 22px;
    }

    .game-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      min-width: 88px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      text-align: center;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 22px;
    }

    .board-wrap {
      position: relative;
      display: grid;
      place-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111315;
    }

    #snakeBoard {
      width: min(86vw, 640px);
      aspect-ratio: 1;
      max-height: 68vh;
      border-radius: 6px;
      image-rendering: pixelated;
      background: #11170f;
    }

    .overlay {
      position: absolute;
      inset: 10px;
      display: grid;
      place-items: center;
      padding: 24px;
      border-radius: 6px;
      background: rgba(10, 11, 12, 0.78);
      text-align: center;
    }

    .overlay[hidden] {
      display: none;
    }

    .overlay h2 {
      margin: 0 0 8px;
      font-size: clamp(24px, 6vw, 48px);
    }

    .overlay p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .main-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .main-actions button,
    .overlay button {
      min-height: 42px;
      padding: 0 16px;
    }

    .pad {
      display: grid;
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: repeat(3, 44px);
      gap: 6px;
    }

    .pad button {
      display: grid;
      place-items: center;
      min-width: 44px;
      min-height: 44px;
      padding: 0;
      font-size: 20px;
      line-height: 1;
    }

    .pad .up { grid-column: 2; grid-row: 1; }
    .pad .left { grid-column: 1; grid-row: 2; }
    .pad .right { grid-column: 3; grid-row: 2; }
    .pad .down { grid-column: 2; grid-row: 3; }

    .linkup-wrap {
      position: relative;
      display: grid;
      place-items: center;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        #17191b;
      background-size: 48px 48px;
    }

    .linkup-board {
      position: relative;
      display: grid;
      grid-template-columns: repeat(8, 64px);
      grid-template-rows: repeat(6, 76px);
      gap: 8px;
      padding: 12px;
      border: 1px solid #4c4232;
      border-radius: 8px;
      background: #24211c;
    }

    .mahjong-tile {
      display: grid;
      place-items: center;
      width: 64px;
      height: 76px;
      padding: 0;
      border: 1px solid #b59b65;
      border-bottom-color: #7f6840;
      border-radius: 8px;
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.2) 42%, transparent 44%),
        linear-gradient(180deg, #fff1d0, var(--tile));
      box-shadow: inset 0 -5px 0 rgba(113, 83, 37, 0.2), 0 5px 0 rgba(0, 0, 0, 0.24);
      color: var(--tile-text);
      font-size: 34px;
      font-weight: 700;
      line-height: 1;
    }

    .mahjong-tile:hover {
      border-color: #f2c76d;
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.24) 42%, transparent 44%),
        linear-gradient(180deg, #fff7df, #efdcae);
    }

    .mahjong-tile.selected {
      border-color: var(--accent-2);
      box-shadow: inset 0 -5px 0 rgba(86, 182, 139, 0.28), 0 0 0 3px rgba(86, 182, 139, 0.34);
      transform: translateY(1px);
    }

    .mahjong-tile.blocked {
      border-color: var(--danger);
      box-shadow: inset 0 -5px 0 rgba(240, 109, 98, 0.22), 0 0 0 3px rgba(240, 109, 98, 0.24);
    }

    .mahjong-tile.empty {
      pointer-events: none;
      visibility: hidden;
    }

    .path-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .path-layer polyline {
      fill: none;
      stroke: #56d39b;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 5;
      filter: drop-shadow(0 0 6px rgba(86, 211, 155, 0.7));
    }

    .linkup-status {
      min-height: 22px;
      margin: 12px 0 0;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 760px) {
      .app-shell {
        width: 100%;
        padding: 12px;
      }

      .topbar,
      .lobby-head,
      .game-header,
      .controls {
        align-items: stretch;
        flex-direction: column;
      }

      .nav,
      .stats {
        justify-content: stretch;
      }

      .nav button,
      .stat,
      .game-card {
        flex: 1;
      }

      .game-grid {
        grid-template-columns: 1fr;
      }

      .linkup-board {
        grid-template-columns: repeat(8, minmax(32px, 1fr));
        grid-template-rows: repeat(6, minmax(42px, 1fr));
        gap: 5px;
        width: 100%;
      }

      .mahjong-tile {
        width: 100%;
        height: 100%;
        min-height: 42px;
        font-size: 24px;
      }

      .pad {
        align-self: center;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <h1>小游戏合集</h1>
        <span>贪吃蛇和连连看都在这里</span>
      </div>
      <nav class="nav" aria-label="游戏导航">
        <button type="button" data-view="lobby">游戏大厅</button>
        <button type="button" data-view="snake">贪吃蛇</button>
        <button type="button" data-view="linkup">连连看</button>
      </nav>
    </header>

    <section class="view active" id="lobbyView">
      <div class="panel lobby">
        <div class="lobby-head">
          <div>
            <p class="hint">一个本地单页小游戏合集，直接打开就能玩。</p>
          </div>
        </div>

        <div class="game-grid">
          <button class="game-card" type="button" data-view="snake">
            <strong>贪吃蛇</strong>
            <span>方向键或 WASD 移动，吃到食物会变长，撞墙或撞到自己就结束。</span>
            <span class="card-art">▣ ▣ ▣ ●</span>
          </button>

          <button class="game-card" type="button" data-view="linkup">
            <strong>连连看</strong>
            <span>点击两张相同麻将牌，能用不超过两次转弯连起来就可以消除。</span>
            <span class="card-art">🀇 🀈 🀉</span>
          </button>
        </div>
      </div>
    </section>

    <section class="view" id="snakeView">
      <div class="panel game-shell">
        <header class="game-header">
          <div class="game-title">
            <h2>贪吃蛇</h2>
            <p class="hint">方向键 / WASD 移动，空格暂停，撞墙或撞到自己就结束。</p>
          </div>
          <div class="stats" aria-label="贪吃蛇数据">
            <div class="stat"><span>分数</span><strong id="snakeScore">0</strong></div>
            <div class="stat"><span>最高</span><strong id="snakeBest">0</strong></div>
            <div class="stat"><span>速度</span><strong id="snakeSpeed">1</strong></div>
          </div>
        </header>

        <section class="board-wrap" aria-label="贪吃蛇棋盘">
          <canvas id="snakeBoard" width="640" height="640"></canvas>
          <div class="overlay" id="snakeOverlay">
            <div>
              <h2 id="snakeOverlayTitle">准备开始</h2>
              <p id="snakeOverlayText">吃到红色食物会变长，分数越高速度越快。</p>
              <button id="snakeOverlayButton" type="button">开始游戏</button>
            </div>
          </div>
        </section>

        <section class="controls" aria-label="贪吃蛇控制">
          <div class="main-actions">
            <button id="snakeStartButton" type="button">开始 / 重开</button>
            <button id="snakePauseButton" type="button">暂停</button>
          </div>

          <div class="pad" aria-label="屏幕方向键">
            <button class="up" type="button" data-dir="up" aria-label="向上">↑</button>
            <button class="left" type="button" data-dir="left" aria-label="向左">←</button>
            <button class="right" type="button" data-dir="right" aria-label="向右">→</button>
            <button class="down" type="button" data-dir="down" aria-label="向下">↓</button>
          </div>
        </section>
      </div>
    </section>

    <section class="view" id="linkupView">
      <div class="panel game-shell">
        <header class="game-header">
          <div class="game-title">
            <h2>连连看</h2>
            <p class="hint">点击两张相同麻将牌，路径不超过两次转弯即可消除。</p>
          </div>
          <div class="stats" aria-label="连连看数据">
            <div class="stat"><span>剩余</span><strong id="linkupPairsLeft">24</strong></div>
            <div class="stat"><span>已消除</span><strong id="linkupMatched">0</strong></div>
          </div>
        </header>

        <section class="linkup-wrap" aria-label="连连看棋盘">
          <div class="linkup-board" id="linkupBoard">
            <svg class="path-layer" id="pathLayer"></svg>
          </div>
        </section>

        <p class="linkup-status" id="linkupStatus">选择两张相同的麻将牌。</p>

        <section class="controls" aria-label="连连看控制">
          <div class="main-actions">
            <button id="linkupRestartButton" type="button">重新开始</button>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script>
    const views = {
      lobby: document.querySelector("#lobbyView"),
      snake: document.querySelector("#snakeView"),
      linkup: document.querySelector("#linkupView")
    };

    let currentView = "lobby";

    document.querySelectorAll("[data-view]").forEach(button => {
      button.addEventListener("click", () => showView(button.dataset.view));
    });

    function showView(name) {
      if (!views[name]) return;

      if (currentView === "snake" && name !== "snake") {
        stopSnakeTimer();
      }

      currentView = name;

      Object.entries(views).forEach(([viewName, element]) => {
        element.classList.toggle("active", viewName === name);
      });

      document.querySelectorAll(".nav [data-view]").forEach(button => {
        button.classList.toggle("active", button.dataset.view === name);
      });

      if (name === "snake") {
        drawSnakeGame();
      }
    }

    const snakeCanvas = document.querySelector("#snakeBoard");
    const snakeCtx = snakeCanvas.getContext("2d");
    const snakeScoreEl = document.querySelector("#snakeScore");
    const snakeBestEl = document.querySelector("#snakeBest");
    const snakeSpeedEl = document.querySelector("#snakeSpeed");
    const snakeOverlay = document.querySelector("#snakeOverlay");
    const snakeOverlayTitle = document.querySelector("#snakeOverlayTitle");
    const snakeOverlayText = document.querySelector("#snakeOverlayText");
    const snakeOverlayButton = document.querySelector("#snakeOverlayButton");
    const snakeStartButton = document.querySelector("#snakeStartButton");
    const snakePauseButton = document.querySelector("#snakePauseButton");

    const snakeGridSize = 24;
    const snakeTile = snakeCanvas.width / snakeGridSize;
    const snakeDirections = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 }
    };

    const snakeState = {
      snake: [],
      food: null,
      direction: snakeDirections.right,
      nextDirection: snakeDirections.right,
      score: 0,
      best: Number(localStorage.getItem("snake-best") || 0),
      level: 1,
      tickMs: 140,
      timer: null,
      running: false,
      paused: false
    };

    snakeBestEl.textContent = snakeState.best;
    resetSnakeState();
    drawSnakeGame();

    function resetSnakeState() {
      snakeState.snake = [
        { x: 11, y: 12 },
        { x: 10, y: 12 },
        { x: 9, y: 12 }
      ];
      snakeState.direction = snakeDirections.right;
      snakeState.nextDirection = snakeDirections.right;
      snakeState.score = 0;
      snakeState.level = 1;
      snakeState.tickMs = 140;
      snakeState.food = spawnSnakeFood();
      updateSnakeStats();
    }

    function startSnakeGame() {
      clearSnakeTimer();
      resetSnakeState();
      snakeState.running = true;
      snakeState.paused = false;
      snakePauseButton.textContent = "暂停";
      snakeOverlay.hidden = true;
      scheduleSnakeTick();
      drawSnakeGame();
    }

    function scheduleSnakeTick() {
      clearSnakeTimer();
      snakeState.timer = setInterval(tickSnake, snakeState.tickMs);
    }

    function clearSnakeTimer() {
      clearInterval(snakeState.timer);
      snakeState.timer = null;
    }

    function stopSnakeTimer() {
      clearSnakeTimer();
      if (snakeState.running) {
        snakeState.paused = true;
        snakePauseButton.textContent = "继续";
      }
    }

    function tickSnake() {
      if (!snakeState.running || snakeState.paused) return;

      snakeState.direction = snakeState.nextDirection;
      const head = {
        x: snakeState.snake[0].x + snakeState.direction.x,
        y: snakeState.snake[0].y + snakeState.direction.y
      };

      if (isSnakeWallHit(head) || isSnakeBodyHit(head)) {
        endSnakeGame();
        return;
      }

      snakeState.snake.unshift(head);

      if (head.x === snakeState.food.x && head.y === snakeState.food.y) {
        snakeState.score += 10;
        snakeState.level = Math.floor(snakeState.score / 50) + 1;
        const newTickMs = Math.max(64, 140 - (snakeState.level - 1) * 10);
        snakeState.food = spawnSnakeFood();

        if (newTickMs !== snakeState.tickMs) {
          snakeState.tickMs = newTickMs;
          scheduleSnakeTick();
        }
      } else {
        snakeState.snake.pop();
      }

      updateSnakeStats();
      drawSnakeGame();
    }

    function endSnakeGame() {
      snakeState.running = false;
      snakeState.paused = false;
      stopSnakeTimer();
      snakePauseButton.textContent = "暂停";

      if (snakeState.score > snakeState.best) {
        snakeState.best = snakeState.score;
        localStorage.setItem("snake-best", snakeState.best);
      }

      updateSnakeStats();
      snakeOverlayTitle.textContent = "游戏结束";
      snakeOverlayText.textContent = `本局得分 ${snakeState.score}，再来一局？`;
      snakeOverlayButton.textContent = "重新开始";
      snakeOverlay.hidden = false;
      drawSnakeGame();
    }

    function toggleSnakePause() {
      if (!snakeState.running) return;
      snakeState.paused = !snakeState.paused;
      snakePauseButton.textContent = snakeState.paused ? "继续" : "暂停";
      snakeOverlayTitle.textContent = "已暂停";
      snakeOverlayText.textContent = "按空格或点击继续回到游戏。";
      snakeOverlayButton.textContent = "继续";
      snakeOverlay.hidden = !snakeState.paused;

      if (!snakeState.paused && !snakeState.timer) {
        scheduleSnakeTick();
      }
    }

    function spawnSnakeFood() {
      let spot;
      do {
        spot = {
          x: Math.floor(Math.random() * snakeGridSize),
          y: Math.floor(Math.random() * snakeGridSize)
        };
      } while (snakeState.snake.some(part => part.x === spot.x && part.y === spot.y));
      return spot;
    }

    function isSnakeWallHit(point) {
      return point.x < 0 || point.y < 0 || point.x >= snakeGridSize || point.y >= snakeGridSize;
    }

    function isSnakeBodyHit(point) {
      return snakeState.snake.some(part => part.x === point.x && part.y === point.y);
    }

    function setSnakeDirection(name) {
      const candidate = snakeDirections[name];
      if (!candidate) return;

      const reversing = candidate.x + snakeState.direction.x === 0 && candidate.y + snakeState.direction.y === 0;
      if (!reversing) {
        snakeState.nextDirection = candidate;
      }
    }

    function updateSnakeStats() {
      snakeScoreEl.textContent = snakeState.score;
      snakeBestEl.textContent = Math.max(snakeState.best, snakeState.score);
      snakeSpeedEl.textContent = snakeState.level;
    }

    function drawSnakeGame() {
      snakeCtx.clearRect(0, 0, snakeCanvas.width, snakeCanvas.height);
      drawSnakeGrid();
      drawSnakeFood();
      drawSnakeBody();
    }

    function drawSnakeGrid() {
      snakeCtx.fillStyle = "#11170f";
      snakeCtx.fillRect(0, 0, snakeCanvas.width, snakeCanvas.height);

      snakeCtx.strokeStyle = "rgba(88, 110, 76, 0.28)";
      snakeCtx.lineWidth = 1;
      for (let i = 0; i <= snakeGridSize; i++) {
        const pos = i * snakeTile;
        snakeCtx.beginPath();
        snakeCtx.moveTo(pos, 0);
        snakeCtx.lineTo(pos, snakeCanvas.height);
        snakeCtx.stroke();
        snakeCtx.beginPath();
        snakeCtx.moveTo(0, pos);
        snakeCtx.lineTo(snakeCanvas.width, pos);
        snakeCtx.stroke();
      }
    }

    function drawSnakeFood() {
      const cx = snakeState.food.x * snakeTile + snakeTile / 2;
      const cy = snakeState.food.y * snakeTile + snakeTile / 2;
      const radius = snakeTile * 0.34;

      snakeCtx.fillStyle = "#ff665c";
      snakeCtx.beginPath();
      snakeCtx.arc(cx, cy, radius, 0, Math.PI * 2);
      snakeCtx.fill();

      snakeCtx.fillStyle = "#ffd166";
      snakeCtx.beginPath();
      snakeCtx.arc(cx - radius * 0.25, cy - radius * 0.3, radius * 0.18, 0, Math.PI * 2);
      snakeCtx.fill();
    }

    function drawSnakeBody() {
      snakeState.snake.forEach((part, index) => {
        const inset = index === 0 ? 3 : 4;
        const x = part.x * snakeTile + inset;
        const y = part.y * snakeTile + inset;
        const size = snakeTile - inset * 2;

        snakeCtx.fillStyle = index === 0 ? "#92e85f" : index % 2 ? "#76d04b" : "#5db83e";
        roundedRect(snakeCtx, x, y, size, size, 6);
        snakeCtx.fill();

        if (index === 0) {
          drawSnakeEyes(part);
        }
      });
    }

    function drawSnakeEyes(head) {
      const centerX = head.x * snakeTile + snakeTile / 2;
      const centerY = head.y * snakeTile + snakeTile / 2;
      const eyeOffset = snakeTile * 0.18;
      const forwardX = snakeState.direction.x * snakeTile * 0.14;
      const forwardY = snakeState.direction.y * snakeTile * 0.14;

      snakeCtx.fillStyle = "#0b100a";
      snakeCtx.beginPath();
      snakeCtx.arc(centerX - eyeOffset + forwardX, centerY - eyeOffset + forwardY, 3, 0, Math.PI * 2);
      snakeCtx.arc(centerX + eyeOffset + forwardX, centerY - eyeOffset + forwardY, 3, 0, Math.PI * 2);
      snakeCtx.fill();
    }

    function roundedRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + width, y, x + width, y + height, radius);
      ctx.arcTo(x + width, y + height, x, y + height, radius);
      ctx.arcTo(x, y + height, x, y, radius);
      ctx.arcTo(x, y, x + width, y, radius);
      ctx.closePath();
    }

    document.addEventListener("keydown", event => {
      if (currentView !== "snake") return;

      const keyMap = {
        ArrowUp: "up",
        w: "up",
        W: "up",
        ArrowDown: "down",
        s: "down",
        S: "down",
        ArrowLeft: "left",
        a: "left",
        A: "left",
        ArrowRight: "right",
        d: "right",
        D: "right"
      };

      if (event.code === "Space") {
        event.preventDefault();
        toggleSnakePause();
        return;
      }

      if (keyMap[event.key]) {
        event.preventDefault();
        setSnakeDirection(keyMap[event.key]);
      }
    });

    document.querySelectorAll("[data-dir]").forEach(button => {
      button.addEventListener("click", () => setSnakeDirection(button.dataset.dir));
    });

    snakeStartButton.addEventListener("click", startSnakeGame);
    snakePauseButton.addEventListener("click", toggleSnakePause);
    snakeOverlayButton.addEventListener("click", () => {
      if (snakeState.paused) {
        toggleSnakePause();
      } else {
        startSnakeGame();
      }
    });

    const linkupBoardEl = document.querySelector("#linkupBoard");
    const pathLayer = document.querySelector("#pathLayer");
    const linkupPairsLeftEl = document.querySelector("#linkupPairsLeft");
    const linkupMatchedEl = document.querySelector("#linkupMatched");
    const linkupStatusEl = document.querySelector("#linkupStatus");
    const linkupRestartButton = document.querySelector("#linkupRestartButton");

    const linkupCols = 8;
    const linkupRows = 6;
    const linkupSymbols = ["🀇", "🀈", "🀉", "🀊", "🀋", "🀌", "🀍", "🀐", "🀑", "🀒", "🀓", "🀔"];
    const linkupState = {
      board: [],
      selected: null,
      matched: 0,
      locked: false
    };

    startLinkupGame();

    function startLinkupGame() {
      linkupState.board = createLinkupBoard();
      linkupState.selected = null;
      linkupState.matched = 0;
      linkupState.locked = false;
      linkupStatusEl.textContent = "选择两张相同的麻将牌。";
      clearLinkupPath();
      renderLinkupBoard();
      updateLinkupStats();
    }

    function createLinkupBoard() {
      const pairCount = linkupCols * linkupRows / 2;
      const tiles = [];

      for (let i = 0; i < pairCount; i++) {
        const symbol = linkupSymbols[i % linkupSymbols.length];
        tiles.push(symbol, symbol);
      }

      shuffle(tiles);

      return Array.from({ length: linkupRows }, (_, row) => {
        return Array.from({ length: linkupCols }, (_, col) => tiles[row * linkupCols + col]);
      });
    }

    function shuffle(items) {
      for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
    }

    function renderLinkupBoard() {
      linkupBoardEl.querySelectorAll(".mahjong-tile").forEach(tile => tile.remove());

      for (let row = 0; row < linkupRows; row++) {
        for (let col = 0; col < linkupCols; col++) {
          const value = linkupState.board[row][col];
          const button = document.createElement("button");
          button.type = "button";
          button.className = "mahjong-tile";
          button.dataset.row = row;
          button.dataset.col = col;
          button.textContent = value || "";
          button.setAttribute("aria-label", value ? `麻将牌 ${value}` : "空格");

          if (!value) {
            button.classList.add("empty");
          }

          if (linkupState.selected && linkupState.selected.row === row && linkupState.selected.col === col) {
            button.classList.add("selected");
          }

          button.addEventListener("click", () => handleLinkupTileClick(row, col));
          linkupBoardEl.append(button);
        }
      }
    }

    function handleLinkupTileClick(row, col) {
      if (linkupState.locked || !linkupState.board[row][col]) return;

      const selected = linkupState.selected;
      if (selected && selected.row === row && selected.col === col) {
        linkupState.selected = null;
        linkupStatusEl.textContent = "已取消选择。";
        renderLinkupBoard();
        return;
      }

      if (!selected) {
        linkupState.selected = { row, col };
        linkupStatusEl.textContent = "再选择一张相同的牌。";
        renderLinkupBoard();
        return;
      }

      const firstValue = linkupState.board[selected.row][selected.col];
      const secondValue = linkupState.board[row][col];

      if (firstValue !== secondValue) {
        flashLinkupTile(row, col);
        linkupState.selected = { row, col };
        linkupStatusEl.textContent = "牌面不同，已改选当前牌。";
        renderLinkupBoard();
        return;
      }

      const path = findLinkupPath(selected, { row, col });
      if (!path) {
        flashLinkupTile(row, col);
        linkupState.selected = { row, col };
        linkupStatusEl.textContent = "这两张牌暂时连不起来。";
        renderLinkupBoard();
        return;
      }

      linkupState.locked = true;
      drawLinkupPath(path);
      linkupStatusEl.textContent = "消除！";

      setTimeout(() => {
        linkupState.board[selected.row][selected.col] = null;
        linkupState.board[row][col] = null;
        linkupState.selected = null;
        linkupState.matched += 1;
        linkupState.locked = false;
        clearLinkupPath();
        renderLinkupBoard();
        updateLinkupStats();

        if (linkupState.matched === linkupCols * linkupRows / 2) {
          linkupStatusEl.textContent = "全部消除，胜利！";
        } else {
          linkupStatusEl.textContent = "继续寻找下一对。";
        }
      }, 220);
    }

    function flashLinkupTile(row, col) {
      requestAnimationFrame(() => {
        const tile = getLinkupTile(row, col);
        if (!tile) return;
        tile.classList.add("blocked");
        setTimeout(() => tile.classList.remove("blocked"), 180);
      });
    }

    function updateLinkupStats() {
      const totalPairs = linkupCols * linkupRows / 2;
      linkupPairsLeftEl.textContent = totalPairs - linkupState.matched;
      linkupMatchedEl.textContent = linkupState.matched;
    }

    function findLinkupPath(start, end) {
      const expandedRows = linkupRows + 2;
      const expandedCols = linkupCols + 2;
      const startPoint = { row: start.row + 1, col: start.col + 1 };
      const endPoint = { row: end.row + 1, col: end.col + 1 };
      const queue = [{ point: startPoint, dir: null, turns: 0, path: [startPoint] }];
      const visited = Array.from({ length: expandedRows }, () => {
        return Array.from({ length: expandedCols }, () => ({
          up: Infinity,
          down: Infinity,
          left: Infinity,
          right: Infinity,
          none: Infinity
        }));
      });
      const directions = [
        { name: "up", row: -1, col: 0 },
        { name: "down", row: 1, col: 0 },
        { name: "left", row: 0, col: -1 },
        { name: "right", row: 0, col: 1 }
      ];

      visited[startPoint.row][startPoint.col].none = 0;

      while (queue.length) {
        const current = queue.shift();

        for (const direction of directions) {
          const next = {
            row: current.point.row + direction.row,
            col: current.point.col + direction.col
          };
          const turns = current.dir && current.dir !== direction.name ? current.turns + 1 : current.turns;

          if (turns > 2 || !isPointInsideExpandedBoard(next, expandedRows, expandedCols)) continue;
          if (!isLinkupPassable(next, endPoint)) continue;
          if (visited[next.row][next.col][direction.name] <= turns) continue;

          const path = current.dir === direction.name
            ? current.path.slice(0, -1).concat(next)
            : current.path.concat(next);

          visited[next.row][next.col][direction.name] = turns;

          if (next.row === endPoint.row && next.col === endPoint.col) {
            return compressLinkupPath(path).map(point => ({
              row: point.row - 1,
              col: point.col - 1
            }));
          }

          queue.push({ point: next, dir: direction.name, turns, path });
        }
      }

      return null;
    }

    function isPointInsideExpandedBoard(point, rows, cols) {
      return point.row >= 0 && point.col >= 0 && point.row < rows && point.col < cols;
    }

    function isLinkupPassable(point, endPoint) {
      if (point.row === endPoint.row && point.col === endPoint.col) return true;
      const row = point.row - 1;
      const col = point.col - 1;

      if (row < 0 || col < 0 || row >= linkupRows || col >= linkupCols) return true;
      return !linkupState.board[row][col];
    }

    function compressLinkupPath(path) {
      if (path.length <= 2) return path;

      const compressed = [path[0]];
      for (let i = 1; i < path.length - 1; i++) {
        const prev = path[i - 1];
        const current = path[i];
        const next = path[i + 1];
        const sameRow = prev.row === current.row && current.row === next.row;
        const sameCol = prev.col === current.col && current.col === next.col;

        if (!sameRow && !sameCol) {
          compressed.push(current);
        }
      }
      compressed.push(path[path.length - 1]);
      return compressed;
    }

    function drawLinkupPath(path) {
      const boardRect = linkupBoardEl.getBoundingClientRect();
      const points = path.map(point => {
        const tile = getLinkupTile(point.row, point.col);
        if (tile) {
          const rect = tile.getBoundingClientRect();
          return {
            x: rect.left - boardRect.left + rect.width / 2,
            y: rect.top - boardRect.top + rect.height / 2
          };
        }

        const sampleTile = getLinkupTile(0, 0);
        const sampleRect = sampleTile.getBoundingClientRect();
        const gap = Number.parseFloat(getComputedStyle(linkupBoardEl).gap) || 0;
        return {
          x: 12 + (point.col * (sampleRect.width + gap)) + sampleRect.width / 2,
          y: 12 + (point.row * (sampleRect.height + gap)) + sampleRect.height / 2
        };
      });

      pathLayer.setAttribute("viewBox", `0 0 ${boardRect.width} ${boardRect.height}`);
      pathLayer.innerHTML = `<polyline points="${points.map(point => `${point.x},${point.y}`).join(" ")}"></polyline>`;
    }

    function clearLinkupPath() {
      pathLayer.innerHTML = "";
    }

    function getLinkupTile(row, col) {
      return linkupBoardEl.querySelector(`.mahjong-tile[data-row="${row}"][data-col="${col}"]`);
    }

    linkupRestartButton.addEventListener("click", startLinkupGame);
    showView("lobby");
  </script>
</body>
</html>
